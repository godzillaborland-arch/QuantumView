<style>
  :root {
    --cream:#F5F0E8; --navy:#12263F; --navy-deep:#0A1728; --navy-mid:#1E3A5F;
    --gold:#E0B94A; --gold-bright:#F2CE68; --gold-deep:#96762A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); font-family:'Inter',sans-serif; color:var(--navy);
         min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:0 0 4rem; }
  .frame { width:100%; max-width:660px; padding:0 1.25rem; }

  .stage { background:var(--navy-deep); width:100%; padding:2.5rem 1.25rem 2rem;
           display:flex; flex-direction:column; align-items:center; margin-bottom:2rem; }
  .stage-inner { width:100%; max-width:660px; }
  .kicker { text-align:center; font-size:12px; letter-spacing:0.28em; text-transform:uppercase;
            color:var(--gold); font-weight:700; }
  .kicker::before, .kicker::after { content:" ✦ "; color:var(--gold-bright); }
  h1 { font-family:'Lora',serif; font-weight:600; font-size:clamp(30px,6vw,40px); text-align:center;
       color:#FBF7EF; margin:0.5rem 0 0.3rem; letter-spacing:0.01em; }
  .sub { text-align:center; font-family:'Lora',serif; font-style:italic; font-size:16px;
         color:var(--gold); margin-bottom:0.5rem; }
  #globe { display:block; width:100%; touch-action:none; cursor:grab; }
  .hint { text-align:center; font-size:11px; letter-spacing:0.16em; text-transform:uppercase;
          color:rgba(224,185,74,0.55); margin-top:-0.5rem; }

  .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:0 0 1.75rem; }
  .chips button { font-family:'Inter',sans-serif; font-size:13px; font-weight:600; padding:8px 18px;
                  border-radius:999px; border:1.5px solid rgba(18,38,63,0.30); background:transparent;
                  color:var(--navy); cursor:pointer; transition:all 0.2s ease; }
  .chips button:hover { border-color:var(--gold-deep); background:rgba(224,185,74,0.12); }
  .chips button.active { background:var(--navy); border-color:var(--navy); color:var(--gold-bright); }

  .card { background:#FFFDF8; border:1px solid rgba(150,118,42,0.35); border-left:5px solid var(--gold);
          border-radius:3px; padding:2.25rem 2.25rem 2rem; box-shadow:0 6px 28px rgba(18,38,63,0.13);
          position:relative; min-height:220px; opacity:1; transition:opacity 0.35s ease; }
  .card::before { content:"“"; position:absolute; top:0.1rem; left:1.2rem; font-family:'Lora',serif;
                  font-size:76px; color:var(--gold); opacity:0.35; line-height:1; }
  .card .loc { font-size:11.5px; letter-spacing:0.22em; text-transform:uppercase; font-weight:700;
               color:var(--gold-deep); text-align:center; margin-bottom:1.1rem; }
  .card .quote { font-family:'Lora',serif; font-size:17.5px; line-height:1.8; color:var(--navy);
                 margin-bottom:1.3rem; position:relative; }
  .card .name { font-family:'Lora',serif; font-size:19px; font-weight:600; color:var(--navy-deep); }
  .card .title { font-size:13px; font-style:italic; font-family:'Lora',serif;
                 color:rgba(18,38,63,0.72); margin-top:4px; }

  .cta-row { display:flex; justify-content:center; margin-top:2rem; }
  .cta { font-family:'Inter',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.1em;
         text-transform:uppercase; text-decoration:none; color:var(--gold-bright); background:var(--navy);
         border:2px solid var(--navy); border-radius:2px; padding:15px 38px; transition:all 0.2s ease; }
  .cta:hover { background:var(--navy-deep); border-color:var(--gold); color:#FFF; }
  .rule { display:flex; align-items:center; gap:12px; margin:2.5rem auto 0; max-width:340px;
          color:var(--gold-deep); font-size:13px; }
  .rule::before, .rule::after { content:""; flex:1; border-top:1px solid rgba(150,118,42,0.45); }
  .footer { text-align:center; font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
            color:rgba(18,38,63,0.65); font-weight:500; margin-top:0.9rem; }
  .footer em { font-style:normal; color:var(--gold-deep); }
</style>

<body>

<div class="stage">
  <div class="stage-inner">
    <p class="kicker">Global voices</p>
    <h1>The Self-Driving Mind</h1>
    <p class="sub">Readers around the world on Sundar Rajan's debut</p>
    <canvas id="globe" aria-label="Rotating globe with endorsement locations"></canvas>
    <p class="hint">Tap a pin or drag to explore</p>
  </div>
</div>

<div class="frame">
  <div class="chips" id="chips"></div>

  <div class="card" id="card">
    <p class="loc" id="card-loc"></p>
    <p class="quote" id="card-quote"></p>
    <p class="name" id="card-name"></p>
    <p class="title" id="card-title"></p>
  </div>

  <div class="cta-row">
    <a class="cta" href="https://theselfdrivingmind.com/tesla-dhyana-blog.html#about-book">About the book</a>
  </div>

  <div class="rule">✦</div>
  <p class="footer">Global voices · <em>The Self-Driving Mind</em></p>
</div>

<script>
(function () {
  var E = [
   {name:"Adriana Pagotti D'Angelo", title:"IT Initiatives & Projects Specialist", loc:"São Paulo, Brazil", chip:"Adriana", lat:-23.55, lon:-46.63,
    quote:"The Self-Driving Mind is more than a book—it is a guide you can return to throughout your life. Sundar Rajan offers a practical and accessible way to understand meditation and cultivate a calmer, more focused mind. His perspective is refreshing, clear, and encouraging. Instead of trying to control the mind, he invites us to observe our thoughts and feelings with greater clarity and ease. I recommend reading this book—and putting its ideas into practice."},
   {name:"Viridiana", title:"Taoist & Energy Consultant", loc:"Yucatán, Mexico", chip:"Viridiana", lat:20.97, lon:-89.62,
    quote:"Beautiful, so interesting, and very enriching."},
   {name:"Dr. Siva", title:"International Security Consultant", loc:"Sydney, Australia", chip:"Dr. Siva", lat:-33.87, lon:151.21,
    quote:"Lovely writing. It flows like a brook with lilts."},
   {name:"MeiMei Fox", title:"2x New York Times Bestselling Author & Forbes Contributor", loc:"Hawaii, USA", chip:"MeiMei Fox", lat:21.31, lon:-157.86,
    quote:"Sundar Rajan is a thoughtful writer… [whose] book sits at the intersection of Eastern spiritual wisdom, neuroscience, and modern technology. You can read his lovely Substack post about losing his passport in Tokyo to get a feel for his voice, and his prose is quite lovely."},
   {name:"Krishnamachari 'Kris' Srikkanth", title:"World Cup 1983 Winner · Former Indian Cricket Captain", loc:"India", chip:"Kris Srikkanth", lat:13.08, lon:80.27,
    quote:"I've known Sundar Rajan for over thirty years, and he's always been someone who sees things from a different angle. In The Self-Driving Mind, he brings together modern technology and timeless wisdom in an interesting and accessible way. Typical Sundar—inviting us to see the mind differently. I wish him every success with the book."},
   {name:"Dr. Jeffery D. Long", title:"Carl W. Zeigler Professor of Religion, Philosophy & Asian Studies · Elizabethtown College", loc:"Pennsylvania, USA", chip:"Dr. Long", lat:40.9, lon:-77.8,
    quote:"In The Self-Driving Mind, Sundar Rajan offers a brilliantly contemporary manual for an ancient human challenge: mastering the restless mind. By using the technical and philosophical parallels of autonomous driving technology as a metaphor for classical Dhyana, Rajan masterfully deconstructs the paradox of meditation—showing that true stillness is not achieved by forced control, but by setting a deep internal direction and surrendering to the flow of awareness. With deep roots in the Vedanta tradition and a sharp technologist's lens, this book bridges ancient insight with modern life in a way that is profoundly practical, deeply encouraging, and radically original."},
   {name:"Joe P.", title:"Book Editor", loc:"Chicago, USA", chip:"Joe P.", lat:41.88, lon:-87.63,
    quote:"I've read through your sample chapter, and I definitely think it shows style and skill. It's not often I see a subject that I've never seen before, but yours is definitely new and exciting. I'm curious to see what your theories are."},
   {name:"Shobha N.", title:"Head of Engineering, AI · Merck", loc:"Germany", chip:"Shobha N.", lat:51.16, lon:10.45,
    quote:"Nicely written. I can surely spread the word amongst my contacts."},
   {name:"Ram", title:"After a webinar on Yoga in Advaita", loc:"Ahmedabad, India", chip:"Ram", lat:23.02, lon:72.57,
    quote:"A very good resonance—the vibe matched really well. It articulated exactly what had been on my mind. A very happy day."},
   {name:"Gopikrishna M.", title:"Co-Founder, MVPServ · On the Lost Passport essay", loc:"Bay Area, California", chip:"Gopikrishna", lat:37.2, lon:-122.6,
    quote:"Amazing."},
   {name:"Alexander Thomson", title:"Senior Cybersecurity Engineer", loc:"Sacramento, California", chip:"A. Thomson", lat:39.2, lon:-121.6,
    quote:"I like the premise of your book, and it's consistent with my own experience."},
   {name:"Srinivasan", title:"Retired Intel Executive", loc:"Granite Bay, California", chip:"Srinivasan", lat:41.2, lon:-120.6,
    quote:"An illuminating historical narrative connecting Srirangam and the Vijayanagara establishment—I highly appreciate the engaging way you have written it."},
   {name:"Suresh V.", title:"Consulting Member, Cloud Development · Oracle", loc:"Seattle, USA", chip:"Suresh V.", lat:47.61, lon:-122.33,
    quote:"Listened to the YouTube presentation. Very nice—good presentation."},
   {name:"V. Subrahmanyan", title:"Advaita Teacher & Speaker", loc:"Bangalore, India", chip:"V. Subrahmanyan", lat:12.97, lon:77.59,
    quote:"Your post on Devata Sakshatkara is too good."}
  ];

  var POLY = [
   [[-168,66],[-140,70],[-125,70],[-110,73],[-95,72],[-80,73],[-70,62],[-55,52],[-65,45],[-75,40],[-76,35],[-81,31],[-81,25],[-90,29],[-97,26],[-97,20],[-105,20],[-110,23],[-114,28],[-124,40],[-125,49],[-135,58],[-153,58],[-166,54]],
   [[-97,20],[-92,15],[-83,9],[-79,8],[-83,14],[-90,16]],
   [[-79,9],[-72,12],[-60,9],[-50,0],[-35,-8],[-40,-20],[-48,-28],[-58,-34],[-65,-40],[-70,-52],[-72,-45],[-73,-35],[-71,-20],[-77,-10],[-80,-3]],
   [[-17,15],[-10,32],[0,36],[10,37],[20,33],[32,31],[43,11],[51,10],[40,-5],[35,-20],[30,-30],[20,-35],[15,-25],[12,-15],[9,4],[-8,4]],
   [[-10,36],[-9,43],[-2,48],[-5,58],[5,62],[15,68],[25,71],[40,68],[50,60],[40,55],[30,45],[25,40],[15,38],[5,36]],
   [[40,68],[60,70],[75,73],[100,77],[130,72],[160,70],[178,66],[170,60],[155,50],[140,42],[122,39],[122,30],[108,18],[105,9],[100,7],[98,15],[90,22],[80,15],[77,8],[72,20],[66,25],[57,25],[48,30],[35,36],[30,45],[40,55],[50,60]],
   [[114,-22],[122,-17],[132,-11],[137,-15],[142,-11],[146,-19],[153,-27],[150,-37],[140,-38],[131,-32],[124,-33],[115,-35]],
   [[-52,60],[-45,60],[-40,64],[-22,70],[-30,83],[-58,76]]
  ];

  function inPoly(lon, lat, p) {
    var c = false;
    for (var i = 0, j = p.length - 1; i < p.length; j = i++) {
      var xi = p[i][0], yi = p[i][1], xj = p[j][0], yj = p[j][1];
      if (((yi > lat) !== (yj > lat)) && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) c = !c;
    }
    return c;
  }

  var dots = [];
  for (var la = -58; la <= 84; la += 4) {
    for (var lo = -180; lo < 180; lo += 4) {
      for (var k = 0; k < POLY.length; k++) {
        if (inPoly(lo, la, POLY[k])) { dots.push([lo, la]); break; }
      }
    }
  }

  var cv = document.getElementById('globe');
  var ctx = cv.getContext('2d');
  var elLoc = document.getElementById('card-loc');
  var elQuote = document.getElementById('card-quote');
  var elName = document.getElementById('card-name');
  var elTitle = document.getElementById('card-title');
  var card = document.getElementById('card');
  var chipBox = document.getElementById('chips');

  var D = Math.PI / 180;
  var lam = 60, phi = 12, tLam = null, tPhi = null, auto = true, sel = 3;
  var GOLD = '#E0B94A', GOLD_BRIGHT = '#F7D97E', CREAM = '#FBF7EF';
  var LINE = 'rgba(224,185,74,0.30)', OCEAN = 'rgba(30,58,95,0.55)';
  var W, H, R, cx, cy, pulse = 0;

  function size() {
    var w = cv.clientWidth || 360;
    W = w; H = Math.round(w * 0.86);
    var d = window.devicePixelRatio || 1;
    cv.width = W * d; cv.height = H * d;
    cv.style.height = H + 'px';
    ctx.setTransform(d, 0, 0, d, 0, 0);
    R = W * 0.38; cx = W / 2; cy = H / 2;
  }

  function proj(lat, lon) {
    var f = lat * D, l = lon * D, f0 = phi * D, l0 = lam * D;
    var cosc = Math.sin(f0) * Math.sin(f) + Math.cos(f0) * Math.cos(f) * Math.cos(l - l0);
    return {
      x: cx + R * Math.cos(f) * Math.sin(l - l0),
      y: cy - R * (Math.cos(f0) * Math.sin(f) - Math.sin(f0) * Math.cos(f) * Math.cos(l - l0)),
      v: cosc > 0, c: cosc
    };
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    var halo = ctx.createRadialGradient(cx, cy, R * 0.85, cx, cy, R * 1.5);
    halo.addColorStop(0, 'rgba(224,185,74,0.28)');
    halo.addColorStop(0.5, 'rgba(224,185,74,0.09)');
    halo.addColorStop(1, 'rgba(224,185,74,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(cx, cy, R * 1.5, 0, 7); ctx.fill();

    var sphere = ctx.createRadialGradient(cx - R * 0.3, cy - R * 0.3, R * 0.1, cx, cy, R);
    sphere.addColorStop(0, 'rgba(42,78,124,0.85)');
    sphere.addColorStop(1, 'rgba(10,23,40,0.95)');
    ctx.fillStyle = sphere;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.fill();

    ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 2; ctx.stroke();

    ctx.lineWidth = 0.7; ctx.strokeStyle = LINE;
    var i, p, m;
    for (i = -180; i < 180; i += 30) {
      ctx.beginPath(); m = false;
      for (var a = -90; a <= 90; a += 4) {
        p = proj(a, i);
        if (p.v) { if (m) ctx.lineTo(p.x, p.y); else ctx.moveTo(p.x, p.y); m = true; } else m = false;
      }
      ctx.stroke();
    }
    for (i = -60; i <= 60; i += 30) {
      ctx.beginPath(); m = false;
      for (var b = -180; b <= 180; b += 4) {
        p = proj(i, b);
        if (p.v) { if (m) ctx.lineTo(p.x, p.y); else ctx.moveTo(p.x, p.y); m = true; } else m = false;
      }
      ctx.stroke();
    }

    ctx.shadowColor = 'rgba(247,217,126,0.7)';
    ctx.shadowBlur = 4;
    for (i = 0; i < dots.length; i++) {
      p = proj(dots[i][1], dots[i][0]);
      if (p.v) {
        ctx.globalAlpha = Math.min(1, 0.35 + p.c * 1.4);
        ctx.fillStyle = GOLD_BRIGHT;
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(1.3, W * 0.004), 0, 7); ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    for (i = 0; i < E.length; i++) {
      p = proj(E[i].lat, E[i].lon);
      if (!p.v) continue;
      var active = (i === sel);
      var r = active ? 8 : 5.5;

      if (active) {
        var ring = R * 0.06 + (pulse % 60) / 60 * R * 0.14;
        ctx.globalAlpha = 0.55 * (1 - (pulse % 60) / 60);
        ctx.beginPath(); ctx.arc(p.x, p.y, r + ring, 0, 7);
        ctx.strokeStyle = GOLD_BRIGHT; ctx.lineWidth = 2; ctx.stroke();
        ctx.globalAlpha = 1;
      }

      ctx.shadowColor = 'rgba(247,217,126,0.9)';
      ctx.shadowBlur = active ? 16 : 8;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 7);
      ctx.fillStyle = active ? CREAM : GOLD_BRIGHT; ctx.fill();
      ctx.shadowBlur = 0;

      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 7);
      ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5; ctx.stroke();

      if (active) {
        ctx.font = '700 12.5px Inter, sans-serif';
        ctx.textAlign = 'center';
        var label = E[i].loc.toUpperCase();
        var wdt = ctx.measureText(label).width;
        ctx.fillStyle = 'rgba(10,23,40,0.85)';
        ctx.fillRect(p.x - wdt / 2 - 9, p.y - r - 27, wdt + 18, 21);
        ctx.strokeStyle = GOLD; ctx.lineWidth = 1;
        ctx.strokeRect(p.x - wdt / 2 - 9, p.y - r - 27, wdt + 18, 21);
        ctx.fillStyle = GOLD_BRIGHT;
        ctx.fillText(label, p.x, p.y - r - 12);
      }
    }
  }

  function shortest(a, b) { var d = (b - a) % 360; if (d > 180) d -= 360; if (d < -180) d += 360; return d; }

  function frame() {
    pulse++;
    if (tLam !== null) {
      var dl = shortest(lam, tLam), dp = tPhi - phi;
      if (Math.abs(dl) < 0.4 && Math.abs(dp) < 0.4) { lam = tLam; phi = tPhi; tLam = null; }
      else { lam += dl * 0.08; phi += dp * 0.08; }
    } else if (auto) {
      lam += 0.15;
    }
    draw();
    requestAnimationFrame(frame);
  }

  var fadeTimer = null, resumeTimer = null;

  function paint(i) {
    var e = E[i];
    elLoc.textContent = e.loc;
    elQuote.textContent = '\u201C' + e.quote + '\u201D';
    elName.textContent = '\u2014 ' + e.name;
    elTitle.textContent = e.title;
    elTitle.style.display = e.title ? 'block' : 'none';
    var btns = chipBox.children;
    for (var j = 0; j < btns.length; j++) {
      btns[j].className = (j === i) ? 'active' : '';
    }
  }

  function select(i, animate) {
    sel = i;
    if (animate === false) {
      paint(i);
    } else {
      card.style.opacity = '0';
      clearTimeout(fadeTimer);
      fadeTimer = setTimeout(function () {
        paint(i);
        card.style.opacity = '1';
      }, 350);
      tLam = E[i].lon;
      tPhi = Math.max(-40, Math.min(40, E[i].lat * 0.7));
      auto = false;
      clearTimeout(resumeTimer);
      resumeTimer = setTimeout(function () { auto = true; }, 6000);
    }
  }

  for (var n = 0; n < E.length; n++) {
    (function (idx) {
      var btn = document.createElement('button');
      btn.textContent = E[idx].chip;
      btn.onclick = function () { select(idx); restartTour(); };
      chipBox.appendChild(btn);
    })(n);
  }

  var tour = null;
  function startTour() {
    tour = setInterval(function () { select((sel + 1) % E.length); }, 8000);
  }
  function restartTour() { clearInterval(tour); startTour(); }
  function stopTour() { clearInterval(tour); tour = null; }

  var drag = false, px = 0, py = 0, moved = false;
  cv.addEventListener('pointerdown', function (e) {
    drag = true; moved = false; px = e.clientX; py = e.clientY;
    auto = false; tLam = null; cv.style.cursor = 'grabbing';
    stopTour();
  });
  window.addEventListener('pointermove', function (e) {
    if (!drag) return;
    var dx = e.clientX - px, dy = e.clientY - py;
    if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
    lam -= dx * 0.4;
    phi = Math.max(-70, Math.min(70, phi + dy * 0.4));
    px = e.clientX; py = e.clientY;
  });
  window.addEventListener('pointerup', function (e) {
    if (!drag) return;
    drag = false; cv.style.cursor = 'grab';
    setTimeout(function () { if (tLam === null) auto = true; }, 4000);
    if (!moved) {
      var r = cv.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
      var best = -1, bd = 500;
      for (var i = 0; i < E.length; i++) {
        var p = proj(E[i].lat, E[i].lon);
        if (!p.v) continue;
        var d2 = (p.x - mx) * (p.x - mx) + (p.y - my) * (p.y - my);
        if (d2 < bd) { bd = d2; best = i; }
      }
      if (best >= 0) select(best);
    }
    restartTour();
  });

  window.addEventListener('resize', size);

  size();
  select(3, false);
  startTour();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
