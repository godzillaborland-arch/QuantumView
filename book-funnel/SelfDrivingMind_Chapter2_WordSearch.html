<body>
<div class="wrap">
  <div class="header">
    <div class="chapter-badge">
      <span class="num">Chapter Two</span>
      <span class="div"></span>
      <span class="sub">Word Search</span>
    </div>
    <h1>The Self-Driving Mind<br><em>A Skeptic Encounters Grace</em></h1>
    <p class="ch-title">"How I Came Up With the Analogy"</p>
    <p class="hint">Click the first letter of a word, then its last letter to select</p>
  </div>
  <div class="btns">
    <button class="primary" onclick="newPuzzle()">New Puzzle</button>
    <button class="secondary" onclick="revealAll()">Reveal Answers</button>
  </div>
  <div class="main">
    <div class="grid-wrap">
      <div id="grid" class="grid"></div>
    </div>
    <div class="sidebar">
      <h3>Find These Words</h3>
      <div id="word-list"></div>
      <div class="score" id="score"></div>
      <div class="msg" id="msg"></div>
    </div>
  </div>
  <div class="footer">The Self-Driving Mind &nbsp;·&nbsp; Morgan James Publishing &nbsp;·&nbsp; TheSelfDrivingMind.com</div>
</div>
<script>
const WORDS = ['GRACE','TESLA','GURU','FREEWAY','LIFETIME','CAPACITY','BETHESDA','SKEPTIC'];
const SIZE = 11;
let grid=[], placements={}, found=new Set(), revealed=false, startCell=null;

function rnd(n){return Math.floor(Math.random()*n)}
function rndLetter(){return String.fromCharCode(65+rnd(26))}
const DIRS = [[0,1],[1,0],[1,1],[1,-1]]; // right, down, diagonal — forward only for simplicity

function canPlace(word,r,c,dr,dc){
  for(let i=0;i<word.length;i++){
    const nr=r+dr*i, nc=c+dc*i;
    if(nr<0||nr>=SIZE||nc<0||nc>=SIZE)return false;
    const ex=grid[nr][nc];
    if(ex&&ex!==word[i])return false;
  }
  return true;
}

function placeWord(word){
  const dirs=[...DIRS].sort(()=>Math.random()-.5);
  for(let attempt=0;attempt<600;attempt++){
    const r=rnd(SIZE), c=rnd(SIZE);
    const [dr,dc]=dirs[attempt%dirs.length];
    if(canPlace(word,r,c,dr,dc)){
      const cells=[];
      for(let i=0;i<word.length;i++){
        grid[r+dr*i][c+dc*i]=word[i];
        cells.push([r+dr*i,c+dc*i]);
      }
      return cells;
    }
  }
  return null;
}

function newPuzzle(){
  found=new Set(); revealed=false; startCell=null;
  grid=Array.from({length:SIZE},()=>Array(SIZE).fill(''));
  placements={};
  [...WORDS].sort(()=>Math.random()-.5).forEach(w=>{
    const c=placeWord(w); if(c)placements[w]=c;
  });
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])grid[r][c]=rndLetter();
  render(); showMsg('');
}

function cellId(r,c){return r*SIZE+c}

function getLine(r1,c1,r2,c2){
  const dr=Math.sign(r2-r1), dc=Math.sign(c2-c1);
  if(r1===r2&&c1===c2)return[[r1,c1]];
  if(Math.abs(r2-r1)>0&&Math.abs(c2-c1)>0&&Math.abs(r2-r1)!==Math.abs(c2-c1))return null;
  const len=Math.max(Math.abs(r2-r1),Math.abs(c2-c1));
  const cells=[];
  for(let i=0;i<=len;i++)cells.push([r1+dr*i,c1+dc*i]);
  return cells;
}

function cellsToWord(cells){return cells.map(([r,c])=>grid[r][c]).join('')}

function checkSelection(cells){
  if(!cells||cells.length<2)return;
  const word=cellsToWord(cells);
  const rev=word.split('').reverse().join('');
  for(const w of WORDS){
    if((word===w||rev===w)&&!found.has(w)){
      found.add(w); startCell=null; render();
      showMsg(found.size===Object.keys(placements).length?'✦ All found!':'Found: '+w);
      return;
    }
  }
  startCell=null; render(); showMsg('');
}

function showMsg(t){document.getElementById('msg').textContent=t}

function handleClick(r,c){
  if(revealed)return;
  if(!startCell){startCell=[r,c];render();}
  else{
    if(startCell[0]===r&&startCell[1]===c){startCell=null;render();return;}
    const line=getLine(startCell[0],startCell[1],r,c);
    checkSelection(line);
  }
}

function getFoundCells(){
  const s=new Set();
  found.forEach(w=>{if(placements[w])placements[w].forEach(([r,c])=>s.add(cellId(r,c)));});
  return s;
}

function render(){
  const foundCells=getFoundCells();
  const revCells=new Set();
  if(revealed)Object.entries(placements).forEach(([w,cells])=>{
    if(!found.has(w))cells.forEach(([r,c])=>revCells.add(cellId(r,c)));
  });
  const selCells=new Set();
  if(startCell)selCells.add(cellId(startCell[0],startCell[1]));

  const gEl=document.getElementById('grid');
  gEl.style.gridTemplateColumns=`repeat(${SIZE},35px)`;
  gEl.innerHTML='';
  for(let r=0;r<SIZE;r++){
    for(let c=0;c<SIZE;c++){
      const div=document.createElement('div');
      div.className='cell'; div.textContent=grid[r][c];
      const id=cellId(r,c);
      if(foundCells.has(id))div.classList.add('found');
      else if(revCells.has(id))div.classList.add('revealed');
      else if(selCells.has(id))div.classList.add('selected');
      div.onclick=()=>handleClick(r,c);
      gEl.appendChild(div);
    }
  }

  const wl=document.getElementById('word-list');
  wl.innerHTML='';
  WORDS.filter(w=>placements[w]).forEach(w=>{
    const isFound=found.has(w), isRev=revealed&&!isFound;
    const div=document.createElement('div');
    div.className='word-item'+(isFound?' found':isRev?' revealed':'');
    div.innerHTML=`<div class="tick${isFound?' done':isRev?' show':''}">${isFound?'✓':isRev?'!':''}</div>${w}`;
    wl.appendChild(div);
  });
  document.getElementById('score').textContent=`Found ${found.size} of ${Object.keys(placements).length}`;
}

function revealAll(){revealed=true;startCell=null;render();showMsg('Answers shown in amber');}

newPuzzle();
</script>
</body>
